<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WMS Login</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1d4ed8);
        color: #fff;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        background: rgba(255, 255, 255, 0.95);

      .btn {
        display: inline-block;
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }

  </head>
  <body>
    <div class="card">
      <h2>WMS Login</h2>
      <p>This placeholder page is now available to the Vite dev server.</p>
